schemaVersion: 2.2.0
metadata:
  name: code-assistant
  label: code-assistant
attributes:
  controller.devfile.io/storage-type: ephemeral
components:
- name: udi
  container:
    image: quay.io/michard/devspaces_base_image:0.1.29
    memoryLimit: 4Gi
    memoryRequest: 2Gi
    cpuLimit: 4000m
    cpuRequest: 1000m
    mountSources: true
    sourceMapping: /projects
commands:
  - id: setup-continue
      exec:
        component: udi
        commandLine: |
          set -eu
          mkdir -p /home/user/.continue
          cp /projects/agent-on-ocp/continue-config.yaml /home/user/.continue/config.yaml
          RHAIIS_API_KEY="$(oc get secret vllm-api-key-secret -n rhaiis -o jsonpath='{.data.VLLM_API_KEY}' | base64 -d)"
          printf "RHAIIS_API_KEY=%s\n" "$RHAIIS_API_KEY" > /home/user/.continue/.env
          chmod 600 /home/user/.continue/.env
events:
  postStart:
    - setup-continue